version: "3.9"

services:
  backend:
    build: ./backend
    container_name: traceagent-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    
  worker:
    build: ./backend
    container_name: traceagent-worker
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "-m", "app.workers.incident_worker"]
  
  frontend:
    build:
      context: ./frontend
      args: 
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: traceagent-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
  
  n8n:
    image: n8nio/n8n:latest
    container_name: traceagent-n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data: